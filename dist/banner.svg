<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Human Genome Labs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1626"/>
      <stop offset="1" stop-color="#06101d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="12%" r="60%">
      <stop offset="0" stop-color="#4de3b5" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4de3b5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="92%" cy="20%" r="60%">
      <stop offset="0" stop-color="#6bb5ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6bb5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- DNA motif -->
  <g transform="translate(915 315)">
    <g fill="none" stroke-width="9" stroke-linecap="round">
      <path d="M-70 -220 C120 -110 120 110 -70 220" stroke="#4de3b5" opacity="0.9"/>
      <path d="M70 -220 C-120 -110 -120 110 70 220" stroke="#6bb5ff" opacity="0.9"/>
    </g>
    <g stroke="#9bb1c5" stroke-width="5" stroke-linecap="round" opacity="0.7">
      <line x1="-40" y1="-170" x2="40" y2="-170"/>
      <line x1="-64" y1="-100" x2="64" y2="-100"/>
      <line x1="-72" y1="-15" x2="72" y2="-15"/>
      <line x1="-64" y1="70" x2="64" y2="70"/>
      <line x1="-40" y1="155" x2="40" y2="155"/>
    </g>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
    <text x="96" y="212" fill="#4de3b5" font-size="26" font-weight="800" letter-spacing="6">PLATAFORMA CIENTÍFICA EVOLUTIVA · v1.0</text>
    <text x="92" y="330" fill="#f1f8ff" font-size="112" font-weight="800" letter-spacing="-4">Human Genome Labs</text>
    <text x="96" y="398" fill="#9bb1c5" font-size="34" font-weight="500">Genética molecular y genómica · reproducible y con evidencia explícita</text>
    <g font-size="24" font-weight="700">
      <rect x="96" y="452" width="196" height="52" rx="26" fill="rgba(77,227,181,0.12)"/>
      <text x="194" y="486" fill="#7ff0cf" text-anchor="middle">TypeScript</text>
      <rect x="308" y="452" width="150" height="52" rx="26" fill="rgba(107,181,255,0.12)"/>
      <text x="383" y="486" fill="#a9d3ff" text-anchor="middle">CLI</text>
      <rect x="474" y="452" width="200" height="52" rx="26" fill="rgba(107,181,255,0.12)"/>
      <text x="574" y="486" fill="#a9d3ff" text-anchor="middle">Web · PWA</text>
      <rect x="690" y="452" width="270" height="52" rx="26" fill="rgba(77,227,181,0.12)"/>
      <text x="825" y="486" fill="#7ff0cf" text-anchor="middle">FASTA · GFF3 · VCF</text>
    </g>
  </g>
</svg>
