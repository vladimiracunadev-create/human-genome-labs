name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos: el pipeline solo lee el repositorio.
permissions:
  contents: read

# Cancela ejecuciones previas de la misma rama/PR para no acumular colas.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (typecheck · validate · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22" # pnpm 11 requiere node:sqlite (Node 22+)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
