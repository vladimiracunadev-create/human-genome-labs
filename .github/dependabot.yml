version: 2
updates:
  - package-ecosystem: "npm" # detecta pnpm-lock.yaml automáticamente
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    # TypeScript 7 (port nativo) es un major muy nuevo: se adopta de forma
    # deliberada, no automática. Se mantienen minor/patch.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      typescript:
        patterns: ["typescript", "@types/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
